<section class="glass-panel p-8 rounded-sm border-l-4 border-green-500/50 mb-8" x-show="history.length > 0">
    <div class="flex justify-between items-center mb-4">
        <h2 class="text-[10px] font-black tracking-[0.4em] uppercase opacity-30 italic">Target_Synced_From_Yesterday</h2>
        <span class="text-[8px] opacity-20" x-text="'Source: Day ' + (history.length)"></span>
    </div>
    <div class="flex items-center gap-6">
        <input type="checkbox" x-model="todayObjectiveDone" class="w-6 h-6 accent-green-500 bg-black border-white/10">
        <div class="text-xl font-bold italic tracking-tight" 
             :class="todayObjectiveDone ? 'line-through opacity-30' : 'text-white'"
             x-text="history[history.length - 1].mustDo"></div>
    </div>
</section>

<template x-if="editingDay !== null">
    <div class="fixed inset-0 z-[200] bg-black/90 backdrop-blur-md flex items-center justify-center p-6">
        <div class="glass-panel max-w-2xl w-full p-10 space-y-6">
            <div class="flex justify-between items-center border-b border-white/10 pb-4">
                <h3 class="text-xs font-black uppercase tracking-widest" x-text="'MODifying_DAY_' + (editingDay + 1)"></h3>
                <button @click="editingDay = null" class="text-xs opacity-40 hover:opacity-100">CLOSE [ESC]</button>
            </div>
            
            <div class="space-y-4">
                <textarea x-model="history[editingDay].dream" class="w-full bg-white/5 border border-white/10 p-4 text-xs h-24 outline-none"></textarea>
                <textarea x-model="history[editingDay].mustDo" class="w-full bg-white/5 border border-white/10 p-4 text-xs h-20 outline-none"></textarea>
            </div>

            <div class="flex justify-between gap-4 pt-6">
                <button @click="deleteDay(editingDay)" class="px-6 py-3 border border-red-900/30 text-red-500 text-[10px] font-bold uppercase tracking-widest hover:bg-red-500 hover:text-white transition">Purge_Entry</button>
                <button @click="updateDay()" class="flex-grow py-3 bg-white text-black text-[10px] font-bold uppercase tracking-widest hover:bg-blue-500 hover:text-white transition">Save_Changes</button>
            </div>
        </div>
    </div>
</template>
