<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P365 // OPERATING SYSTEM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; }
        .border-subtle { border: 1px solid rgba(255,255,255,0.1); }
        .bg-card { background: rgba(255,255,255,0.03); }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body x-data="projectOS()" x-init="init()">

    <nav class="fixed top-0 w-full p-6 flex justify-between items-center border-b border-white/10 bg-black/80 backdrop-blur-md z-50">
        <div class="font-black tracking-tighter text-xl underline decoration-2">P365 // COMMAND</div>
        <div class="flex gap-10 text-[10px] font-bold tracking-[0.2em] opacity-60">
            <div>DAY <span class="text-white" x-text="day"></span>/365</div>
            <div>STATUS: <span class="text-green-500">OPERATIONAL</span></div>
        </div>
    </nav>

    <main class="pt-32 px-6 max-w-6xl mx-auto space-y-12 pb-20">
        
        <section class="p-12 border-subtle bg-card rounded-sm text-center">
            <h2 class="text-[10px] tracking-[0.4em] uppercase opacity-40 mb-10">Deep Work Protocol // 180 Minutes</h2>
            <div class="text-9xl font-black tracking-tighter mb-12 tabular-nums" x-text="formatTime()">180:00</div>
            
            <div class="flex justify-center gap-4">
                <button @click="toggleTimer()" 
                        class="px-12 py-4 bg-white text-black font-black uppercase text-xs hover:bg-gray-200 transition"
                        x-text="running ? 'PAUSE' : 'INITIATE BLOCK'"></button>
                <button @click="resetTimer()" class="px-8 py-4 border-subtle text-xs font-bold uppercase opacity-40 hover:opacity-100">Reset</button>
            </div>
        </section>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-12">
            
            <section class="space-y-6">
                <div class="flex justify-between items-baseline">
                    <h3 class="font-black text-2xl uppercase tracking-tighter">Friction Subtraction</h3>
                    <span class="text-[9px] opacity-30">REMOVAL > ADDITION</span>
                </div>
                
                <div class="flex gap-2">
                    <input type="text" x-model="newFriction" @keydown.enter="addFriction()" 
                           placeholder="Describe the resistance..." 
                           class="w-full bg-white/5 border-subtle p-4 text-sm outline-none focus:border-white/40">
                    <button @click="addFriction()" class="p-4 bg-white/10 hover:bg-white/20 font-bold">+</button>
                </div>

                <div class="space-y-2">
                    <template x-for="f in frictions" :key="f.id">
                        <div class="p-4 border-subtle flex justify-between items-center group">
                            <span class="text-sm opacity-70" x-text="f.text"></span>
                            <button @click="removeFriction(f.id)" class="text-[10px] font-bold text-red-500 opacity-0 group-hover:opacity-100 transition">RESOLVED</button>
                        </div>
                    </template>
                </div>
            </section>

            <section class="space-y-6">
                <h3 class="font-black text-2xl uppercase tracking-tighter">Stack Links</h3>
                <div class="grid grid-cols-1 gap-2">
                    <a href="https://notion.so" target="_blank" class="p-6 border-subtle bg-card hover:bg-white hover:text-black transition flex justify-between items-center">
                        <span class="font-bold text-sm tracking-widest uppercase italic">Notion // Operating System</span>
                        <span class="text-xs">-></span>
                    </a>
                    <a href="https://obsidian.md" target="_blank" class="p-6 border-subtle bg-card hover:bg-white hover:text-black transition flex justify-between items-center">
                        <span class="font-bold text-sm tracking-widest uppercase italic">Obsidian // Second Brain</span>
                        <span class="text-xs">-></span>
                    </a>
                    <a href="https://github.com/TemuulenDGC" target="_blank" class="p-6 border-subtle bg-card hover:bg-white hover:text-black transition flex justify-between items-center">
                        <span class="font-bold text-sm tracking-widest uppercase italic">GitHub // Commit Logic</span>
                        <span class="text-xs">-></span>
                    </a>
                </div>
            </section>

        </div>
    </main>

    <script>
        function projectOS() {
            return {
                day: Math.floor((new Date() - new Date('2026-01-01')) / 86400000),
                timer: 180 * 60,
                running: false,
                interval: null,
                frictions: [],
                newFriction: '',

                init() {
                    this.frictions = JSON.parse(localStorage.getItem('p365_frictions') || '[]');
                },

                formatTime() {
                    let m = Math.floor(this.timer / 60);
                    let s = this.timer % 60;
                    return `${m}:${s < 10 ? '0' : ''}${s}`;
                },

                toggleTimer() {
                    if (this.running) {
                        clearInterval(this.interval);
                    } else {
                        this.interval = setInterval(() => {
                            if (this.timer > 0) this.timer--;
                        }, 1000);
                    }
                    this.running = !this.running;
                },

                resetTimer() {
                    clearInterval(this.interval);
                    this.timer = 180 * 60;
                    this.running = false;
                },

                addFriction() {
                    if (this.newFriction.trim() === '') return;
                    this.frictions.push({ id: Date.now(), text: this.newFriction });
                    localStorage.setItem('p365_frictions', JSON.stringify(this.frictions));
                    this.newFriction = '';
                },

                removeFriction(id) {
                    this.frictions = this.frictions.filter(f => f.id !== id);
                    localStorage.setItem('p365_frictions', JSON.stringify(this.frictions));
                }
            }
        }
    </script>
</body>
</html>
