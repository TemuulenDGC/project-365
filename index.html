<!DOCTYPE html>
<html lang="en" x-data="project365()" x-init="init()">
<head>
    <meta charset="UTF-8">
    <title>P365 // STRATEGIC ADVISOR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background: #020202; color: #fff; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.08); backdrop-blur: 20px; }
        .progress-ring { transition: stroke-dashoffset 0.5s ease; transform: rotate(-90deg); transform-origin: 50% 50%; }
        .ai-glow { box-shadow: 0 0 20px rgba(59, 130, 246, 0.1); border: 1px solid rgba(59, 130, 246, 0.2); }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="antialiased selection:bg-blue-500/30">

    <div class="fixed top-6 left-6 z-[110] flex items-center gap-4 glass p-3 pr-6 rounded-full">
        <svg class="w-12 h-12">
            <circle class="text-white/5" stroke-width="4" stroke="currentColor" fill="transparent" r="20" cx="24" cy="24"/>
            <circle class="text-blue-500 progress-ring" stroke-width="4" :stroke-dasharray="125.6" :stroke-dashoffset="125.6 - (125.6 * (history.length / settings.totalDays))" stroke-linecap="round" stroke="currentColor" fill="transparent" r="20" cx="24" cy="24"/>
        </svg>
        <div>
            <div class="text-[10px] font-black uppercase tracking-tighter leading-none" x-text="Math.round((history.length / settings.totalDays)*100) + '% COMPLETE'"></div>
            <div class="text-[8px] opacity-40 uppercase tracking-widest mt-1">Global Vector</div>
        </div>
    </div>

    <main class="pt-32 px-6 max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8 pb-24">
        
        <div class="lg:col-span-4 space-y-6">
            <section class="glass ai-glow p-8 rounded-2xl sticky top-32">
                <div class="flex items-center gap-3 mb-6">
                    <div class="w-2 h-2 bg-blue-500 rounded-full animate-ping"></div>
                    <h2 class="text-xs font-black tracking-[0.3em] uppercase opacity-70">AI Strategic Layer</h2>
                </div>
                
                <div class="space-y-6">
                    <div class="p-4 bg-blue-500/5 border border-blue-500/20 rounded-lg text-xs leading-relaxed italic text-blue-100/80">
                        <span x-text="aiInsight || 'Analyzing current trajectory... Archive a day to generate insight.'"></span>
                    </div>
                    
                    <button @click="generateAIInsight()" class="w-full py-3 bg-blue-600 text-[10px] font-black uppercase tracking-widest hover:bg-blue-500 transition shadow-lg shadow-blue-900/20">
                        Run Pattern Audit
                    </button>

                    <div class="pt-6 border-t border-white/5 space-y-4">
                        <div class="flex justify-between text-[9px] uppercase tracking-widest opacity-40">
                            <span>Compounding Rate</span>
                            <span class="text-blue-400">1.1x</span>
                        </div>
                        <div class="flex justify-between text-[9px] uppercase tracking-widest opacity-40">
                            <span>Identity Stability</span>
                            <span x-text="efficiency + '%'"></span>
                        </div>
                    </div>
                </div>
            </section>
        </div>

        <div class="lg:col-span-8 space-y-8">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <section class="glass p-8 rounded-2xl space-y-4">
                    <h3 class="text-[10px] font-black tracking-widest uppercase opacity-30 italic">Subconscious</h3>
                    <textarea x-model="dailyData.dream" class="w-full bg-white/5 border border-white/5 p-4 text-xs outline-none focus:border-white/20 h-32" placeholder="Dream record..."></textarea>
                </section>
                <section class="glass p-8 rounded-2xl space-y-4">
                    <h3 class="text-[10px] font-black tracking-widest uppercase opacity-30 italic">Friction Audit</h3>
                    <textarea x-model="dailyData.dontDo" class="w-full bg-white/5 border border-red-500/10 p-4 text-xs outline-none focus:border-red-500/20 h-32" placeholder="What to SUBTRACT tomorrow..."></textarea>
                </section>
            </div>

            <section class="glass p-8 rounded-2xl">
                <div class="flex justify-between items-end mb-8">
                    <h2 class="text-xs font-black tracking-[0.4em] uppercase opacity-30 italic">Permanent Win Gallery</h2>
                    <button @click="endDay()" class="px-8 py-3 bg-white text-black font-black text-[10px] uppercase tracking-widest hover:invert transition">Archive Evidence</button>
                </div>
                <div class="flex flex-wrap gap-1.5">
                    <template x-for="i in parseInt(settings.totalDays)">
                        <div class="w-3 h-3 rounded-sm transition-all duration-500" :class="i <= history.length ? 'bg-white shadow-[0_0_10px_rgba(255,255,255,0.2)]' : 'bg-white/5'"></div>
                    </template>
                </div>
            </section>
        </div>
    </main>

    <script>
        function project365() {
            return {
                settings: { active: true, totalDays: 365, userName: 'Temuulen' },
                dailyData: { dream: '', gratitude: ['', '', ''], dontDo: '', mustDo: '' },
                history: [],
                efficiency: 0,
                aiInsight: '',

                init() {
                    const h = localStorage.getItem('p365_history');
                    if (h) this.history = JSON.parse(h);
                    this.calculateEfficiency();
                },

                endDay() {
                    if(!this.dailyData.mustDo && !this.dailyData.dream) return alert("Log evidence before archiving.");
                    this.history.push({ date: new Date().toLocaleDateString(), ...this.dailyData });
                    localStorage.setItem('p365_history', JSON.stringify(this.history));
                    this.dailyData = { dream: '', gratitude: ['', '', ''], dontDo: '', mustDo: '' };
                    this.calculateEfficiency();
                    this.generateAIInsight();
                },

                generateAIInsight() {
                    if (this.history.length < 1) {
                        this.aiInsight = "Insufficient data. Stack your first brick to begin the audit.";
                        return;
                    }
                    const lastEntry = this.history[this.history.length - 1];
                    const insights = [
                        `Identity shift detected. Your focus on '${lastEntry.mustDo.substring(0,15)}...' is compounding.`,
                        "Pattern Alert: Your 'Don't Do' list suggests a recurring friction in deep work blocks.",
                        "Subconscious Audit: Dream themes indicate high cognitive processing. Maintain 180m protocol.",
                        "Efficiency is optimal. The asymptote is nearing. Do not break the chain."
                    ];
                    this.aiInsight = insights[Math.floor(Math.random() * insights.length)];
                },

                calculateEfficiency() {
                    this.efficiency = Math.round((this.history.length / 365) * 100);
                }
            }
        }
    </script>
</body>
</html>
