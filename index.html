<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P365 // OPERATING SYSTEM</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { obsidian: '#050505', studio: '#0A0A0A', chalk: '#F9F9F9' },
                    fontFamily: { serif: ['Instrument Serif', 'serif'], sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>

    <style>
        body { background-color: #050505; color: #F9F9F9; }
        .glass { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); backdrop-filter: blur(10px); }
        .input-dark { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; outline: none; }
        .input-dark:focus { border-color: rgba(255,255,255,0.4); }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="font-sans antialiased" x-data="{ 
    day: Math.floor((new Date() - new Date('2026-01-01')) / 86400000),
    frictions: JSON.parse(localStorage.getItem('p365_frictions') || '[]'),
    wins: parseInt(localStorage.getItem('p365_wins') || '0'),
    addFriction(val) {
        if(!val) return;
        this.frictions.push({id: Date.now(), text: val});
        localStorage.setItem('p365_frictions', JSON.stringify(this.frictions));
    },
    removeFriction(id) {
        this.frictions = this.frictions.filter(f => f.id !== id);
        localStorage.setItem('p365_frictions', JSON.stringify(this.frictions));
    },
    addWin() {
        this.wins++;
        localStorage.setItem('p365_wins', this.wins);
    }
}">

    <nav class="fixed top-0 w-full z-50 p-6 flex justify-between items-center glass">
        <div class="font-serif italic text-2xl tracking-tighter">P365/OS</div>
        <div class="flex gap-8 text-[10px] tracking-widest uppercase opacity-60 font-bold">
            <div>CYCLE: <span class="text-white" x-text="day"></span>/365</div>
            <div>WINS: <span class="text-white" x-text="wins"></span></div>
        </div>
    </nav>

    <main class="pt-32 px-6 md:px-24 pb-20">
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
            
            <div class="md:col-span-2 glass p-8 rounded-lg">
                <div class="flex justify-between items-baseline mb-6">
                    <h3 class="font-serif text-3xl italic">Subtraction Log</h3>
                    <span class="text-[9px] uppercase tracking-widest opacity-40">Protocol: Remove Friction</span>
                </div>
                
                <div class="flex gap-2 mb-6">
                    <input type="text" x-ref="frictionInput" @keydown.enter="addFriction($refs.frictionInput.value); $refs.frictionInput.value=''" 
                           placeholder="Identify a friction point..." class="w-full p-3 rounded-md input-dark text-sm">
                    <button @click="addFriction($refs.frictionInput.value); $refs.frictionInput.value=''" 
                            class="px-6 bg-white text-black font-bold text-xs uppercase hover:bg-gray-200 transition">Add</button>
                </div>

                <div class="space-y-2 max-h-48 overflow-y-auto pr-2">
                    <template x-for="item in frictions" :key="item.id">
                        <div class="flex justify-between items-center p-3 border border-white/5 bg-white/5 rounded group hover:border-white/20 transition">
                            <span class="text-sm opacity-80" x-text="item.text"></span>
                            <button @click="removeFriction(item.id)" class="text-[10px] uppercase font-bold opacity-0 group-hover:opacity-100 text-red-400">Delete</button>
                        </div>
                    </template>
                </div>
            </div>

            <div class="glass p-8 rounded-lg flex flex-col justify-between">
                <div>
                    <h3 class="font-serif text-3xl italic mb-2">Evidence</h3>
                    <p class="text-[10px] uppercase tracking-widest opacity-40 leading-relaxed">Stack proof of identity daily.</p>
                </div>
                <div class="py-8 text-center">
                    <div class="text-7xl font-serif italic mb-2" x-text="wins">0</div>
                    <div class="text-[9px] uppercase tracking-[0.3em] opacity-30">Permanent Wins</div>
                </div>
                <button @click="addWin()" class="w-full py-4 border border-white/20 font-bold uppercase text-[10px] tracking-widest hover:bg-white hover:text-black transition">
                    Lay a Brick
                </button>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
            <a href="https://notion.so" target="_blank" class="glass p-6 group hover:border-white/40 transition">
                <div class="flex justify-between items-start mb-8">
                    <span class="text-[9px] uppercase tracking-widest opacity-40">System</span>
                    <div class="w-2 h-2 rounded-full bg-blue-500 animate-pulse"></div>
                </div>
                <h4 class="font-serif text-2xl italic">Notion OS</h4>
                <p class="text-xs opacity-40 mt-2">Open Logistics Dashboard</p>
            </a>

            <a href="https://obsidian.md" target="_blank" class="glass p-6 group hover:border-white/40 transition">
                <div class="flex justify-between items-start mb-8">
                    <span class="text-[9px] uppercase tracking-widest opacity-40">Memory</span>
                    <div class="w-2 h-2 rounded-full bg-purple-500"></div>
                </div>
                <h4 class="font-serif text-2xl italic">Obsidian</h4>
                <p class="text-xs opacity-40 mt-2">Review Knowledge Graph</p>
            </a>

            <a href="https://github.com/TemuulenDGC" target="_blank" class="glass p-6 group hover:border-white/40 transition">
                <div class="flex justify-between items-start mb-8">
                    <span class="text-[9px] uppercase tracking-widest opacity-40">Forge</span>
                    <div class="w-2 h-2 rounded-full bg-green-500"></div>
                </div>
                <h4 class="font-serif text-2xl italic">GitHub</h4>
                <p class="text-xs opacity-40 mt-2">Commit Code Proof</p>
            </a>

            <div class="glass p-6 bg-white text-black flex flex-col justify-center text-center">
                <p class="text-[10px] uppercase font-bold tracking-widest mb-1">Target Result</p>
                <p class="font-serif text-4xl italic leading-none">n<sup>1.1</sup></p>
            </div>
        </div>
    </main>

    <footer class="fixed bottom-0 w-full p-4 text-center text-[8px] tracking-[1em] uppercase opacity-20 pointer-events-none">
        Operational Authority // 2026
    </footer>

</body>
</html>
