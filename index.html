<!DOCTYPE html>
<html lang="en" x-data="project365()" x-init="init()">
<head>
    <meta charset="UTF-8">
    <title>P365 // COMMAND_MAX_V13</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background: #050505; color: #e5e5e5; font-family: 'JetBrains Mono', monospace; }
        .glass { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); }
        .brick { width: 14px; height: 14px; border-radius: 2px; transition: 0.2s; cursor: pointer; }
        .brick-none { background: rgba(255,255,255,0.05); }
        .brick-win { background: #ffffff; box-shadow: 0 0 8px #fff; }
        .brick-friction { background: #ef4444; box-shadow: 0 0 8px #ef4444; }
    </style>
</head>
<body class="p-8">

    <div class="flex justify-between items-center mb-12 glass p-4 rounded-lg">
        <div class="flex items-center gap-6">
            <h1 class="text-xs font-black tracking-[.5em] text-blue-500">P365_OPERATING_SYSTEM</h1>
            <div class="h-4 w-[1px] bg-white/10"></div>
            <div class="text-[10px] opacity-50">STREAK: <span class="text-white" x-text="history.length"></span></div>
        </div>
        <div class="flex gap-4">
            <button @click="exportVault()" class="text-[9px] border border-white/10 px-3 py-1 hover:bg-white hover:text-black">EXPORT_JSON</button>
            <button @click="importVault()" class="text-[9px] border border-white/10 px-3 py-1 hover:bg-white hover:text-black">IMPORT_JSON</button>
        </div>
    </div>

    <div class="grid grid-cols-12 gap-8">
        <div class="col-span-12 lg:col-span-4 space-y-6">
            <div class="glass p-6">
                <label class="text-[10px] uppercase tracking-widest opacity-30 mb-4 block">01_Daily_Target</label>
                <input x-model="current.mustDo" class="w-full bg-black border-b border-white/20 p-2 text-sm outline-none focus:border-blue-500" placeholder="One non-negotiable win...">
            </div>

            <div class="glass p-6">
                <label class="text-[10px] uppercase tracking-widest opacity-30 mb-4 block">02_Forensic_Debug</label>
                <select x-model="current.frictionLevel" class="w-full bg-black text-[10px] mb-4 border border-white/10 p-2 outline-none">
                    <option value="low">Low Friction (Smooth)</option>
                    <option value="high">High Friction (Bug Identified)</option>
                </select>
                <textarea x-model="current.friction" class="w-full bg-black border border-white/10 p-4 text-xs h-24 outline-none focus:border-red-500/50" placeholder="What slowed you down today?"></textarea>
            </div>

            <button @click="archive()" class="w-full py-4 bg-white text-black font-black text-xs tracking-[.3em] hover:bg-blue-600 hover:text-white transition">ARCHIVE_DAY_EVIDENCE</button>
        </div>

        <div class="col-span-12 lg:col-span-8 space-y-6">
            <div class="glass p-8 min-h-[400px]">
                <div class="flex justify-between items-end mb-8">
                    <h2 class="text-[10px] font-bold opacity-30 tracking-widest">COMPOUND_WALL_VIZ</h2>
                    <div class="text-[40px] font-black italic tracking-tighter" x-text="Math.round((history.length/365)*100) + '%'"></div>
                </div>
                
                <div class="flex flex-wrap gap-2">
                    <template x-for="(day, i) in 365" :key="i">
                        <div @click="viewDay(i)" 
                             class="brick" 
                             :class="getBrickClass(i)"
                             :title="history[i] ? history[i].date : 'Locked'"></div>
                    </template>
                </div>
            </div>
            
            <div class="glass p-6 border-l-4 border-blue-500">
                <h3 class="text-[9px] font-bold opacity-50 mb-4">COMMANDER_AI_FEED</h3>
                <p class="text-[11px] italic text-blue-200/70" x-text="aiOutput || 'Ready for telemetry analysis...'"></p>
                <button @click="runOllama()" class="mt-4 text-[9px] opacity-40 hover:opacity-100 underline">GENERATE_STRATEGIC_REPORT</button>
            </div>
        </div>
    </div>

    <script>
        function project365() {
            return {
                history: [],
                current: { mustDo: '', friction: '', frictionLevel: 'low' },
                aiOutput: '',
                init() { this.history = JSON.parse(localStorage.getItem('p365_v13') || '[]'); },
                archive() {
                    if(!this.current.mustDo) return alert("TARGET_MISSING");
                    this.history.push({ ...this.current, date: new Date().toLocaleDateString() });
                    localStorage.setItem('p365_v13', JSON.stringify(this.history));
                    this.current = { mustDo: '', friction: '', frictionLevel: 'low' };
                },
                getBrickClass(i) {
                    if (!this.history[i]) return 'brick-none';
                    return this.history[i].frictionLevel === 'high' ? 'brick-friction' : 'brick-win';
                },
                exportVault() {
                    const data = JSON.stringify(this.history);
                    const blob = new Blob([data], {type: 'application/json'});
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url; a.download = 'p365_vault_backup.json'; a.click();
                },
                // Additional AI and logic methods go here...
            }
        }
    </script>
</body>
</html>
