<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P120 // COMMAND</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background: #050505; color: #fff; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); }
        .progress-bar { transition: width 1s cubic-bezier(0.4, 0, 0.2, 1); }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body x-data="project120()" x-init="init()">

    <nav class="fixed top-0 w-full p-6 glass backdrop-blur-xl z-50 flex flex-col gap-2">
        <div class="flex justify-between items-end">
            <span class="font-black tracking-tighter text-xl italic underline decoration-white/20">P120/OS</span>
            <span class="text-[10px] font-bold tracking-widest opacity-40 uppercase" x-text="`DAY ${currentDay} / 120` "></span>
        </div>
        <div class="w-full h-1 bg-white/5 overflow-hidden rounded-full">
            <div class="h-full bg-white progress-bar" :style="`width: ${(currentDay/120)*100}%`"></div>
        </div>
    </nav>

    <main class="pt-32 px-6 max-w-4xl mx-auto space-y-8 pb-24">
        
        <section class="glass p-8 rounded-lg space-y-6">
            <div class="flex justify-between items-center border-b border-white/5 pb-4">
                <h2 class="text-xs font-black tracking-[0.3em] uppercase opacity-50 italic">AM // Identity Frame</h2>
                <span class="text-[10px] opacity-20" x-text="todayDate"></span>
            </div>
            
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] uppercase tracking-widest block mb-2 opacity-40">Dream Log / Subconscious</label>
                    <textarea x-model="logs.morning.dream" @input="save()" class="w-full bg-white/5 border border-white/10 p-4 text-sm outline-none focus:border-white/30 h-24" placeholder="Last night's dream..."></textarea>
                </div>
                <div>
                    <label class="text-[10px] uppercase tracking-widest block mb-2 opacity-40">3 Gratitudes (Evidence of Abundance)</label>
                    <template x-for="(g, index) in logs.morning.gratitude" :key="index">
                        <input type="text" x-model="logs.morning.gratitude[index]" @input="save()" 
                               class="w-full bg-white/5 border border-white/10 p-3 text-sm mb-2 outline-none focus:border-white/30" :placeholder="`Gratitude #${index + 1}`">
                    </template>
                </div>
            </div>
        </section>

        <section class="glass p-8 rounded-lg space-y-6">
            <h2 class="text-xs font-black tracking-[0.3em] uppercase opacity-50 italic border-b border-white/5 pb-4">PM // The 1% Audit</h2>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="space-y-4">
                    <label class="text-[10px] uppercase tracking-widest block opacity-40">One thing I should NOT do tomorrow</label>
                    <textarea x-model="logs.evening.dontDo" @input="save()" class="w-full bg-white/5 border border-red-500/10 p-4 text-sm outline-none focus:border-red-500/30 h-20" placeholder="A mistake to fix..."></textarea>
                </div>
                <div class="space-y-4">
                    <label class="text-[10px] uppercase tracking-widest block opacity-40">One thing I MUST do tomorrow</label>
                    <textarea x-model="logs.evening.mustDo" @input="save()" class="w-full bg-white/5 border border-green-500/10 p-4 text-sm outline-none focus:border-green-500/30 h-20" placeholder="A win to stack..."></textarea>
                </div>
            </div>
        </section>

        <section class="glass p-8 rounded-lg">
            <h2 class="text-xs font-black tracking-[0.3em] uppercase opacity-50 italic border-b border-white/5 pb-4 mb-6">Tomorrow's Architecture</h2>
            <div class="flex gap-2 mb-6">
                <input type="text" x-model="newTask" @keydown.enter="addTask()" placeholder="Critical Task for tomorrow..." class="w-full bg-white/5 border border-white/10 p-3 text-sm outline-none">
                <button @click="addTask()" class="px-6 bg-white text-black font-black text-[10px] uppercase tracking-widest">Add</button>
            </div>
            <div class="space-y-2">
                <template x-for="(task, i) in logs.nextDayTasks" :key="task.id">
                    <div class="flex items-center gap-4 p-4 border border-white/5 bg-white/[0.02] group">
                        <input type="checkbox" x-model="task.done" @change="save()" class="w-4 h-4 accent-white bg-transparent border-white/20">
                        <span class="text-sm flex-grow" :class="task.done ? 'line-through opacity-30' : 'opacity-80'" x-text="task.text"></span>
                        <button @click="removeTask(task.id)" class="text-[9px] font-bold text-red-500 opacity-0 group-hover:opacity-100 uppercase">Remove</button>
                    </div>
                </template>
            </div>
        </section>

    </main>

    <script>
        function project120() {
            return {
                currentDay: Math.floor((new Date() - new Date('2026-03-01')) / 86400000) || 1,
                todayDate: new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }),
                newTask: '',
                logs: {
                    morning: { dream: '', gratitude: ['', '', ''] },
                    evening: { dontDo: '', mustDo: '', reflection: '' },
                    nextDayTasks: []
                },
                init() {
                    const saved = localStorage.getItem('p120_v1');
                    if (saved) this.logs = JSON.parse(saved);
                },
                save() {
                    localStorage.setItem('p120_v1', JSON.stringify(this.logs));
                },
                addTask() {
                    if(!this.newTask) return;
                    this.logs.nextDayTasks.push({ id: Date.now(), text: this.newTask, done: false });
                    this.save();
                    this.newTask = '';
                },
                removeTask(id) {
                    this.logs.nextDayTasks = this.logs.nextDayTasks.filter(t => t.id !== id);
                    this.save();
                }
            }
        }
    </script>
</body>
</html>
