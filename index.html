<!DOCTYPE html>
<html lang="en" x-data="p365()">
<head>
    <meta charset="UTF-8">
    <title>PROJECT_365 // ELITE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        [x-cloak] { display: none !important; }
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; }
        .grid-cell { width: 12px; height: 12px; border-radius: 2px; }
        .win { background: #fff; box-shadow: 0 0 10px rgba(255,255,255,0.4); }
        .empty { background: rgba(255,255,255,0.05); }
    </style>
</head>
<body x-init="init()">
    <div class="max-w-5xl mx-auto px-6 py-20">
        
        <div class="flex justify-between items-end mb-20 border-b border-white/10 pb-10">
            <div>
                <h1 class="text-4xl font-black italic tracking-tighter">PROJECT_365</h1>
                <p class="text-[10px] uppercase tracking-[0.4em] opacity-40 mt-2">Personal Velocity Operating System</p>
            </div>
            <div class="text-right">
                <div class="text-5xl font-black tabular-nums" x-text="Math.round((history.length/365)*100) + '%'"></div>
                <div class="text-[9px] uppercase opacity-30">Total Vector Completion</div>
            </div>
        </div>

        <section class="mb-20">
            <h2 class="text-[10px] uppercase opacity-30 mb-6 tracking-widest">Active Objective</h2>
            <div class="flex items-center gap-6 bg-white/5 p-8 rounded-xl border border-white/10">
                <input type="checkbox" x-model="todayDone" class="w-10 h-10 accent-white">
                <h3 class="text-2xl font-bold" :class="todayDone ? 'line-through opacity-20' : ''" x-text="getCurrentGoal()"></h3>
            </div>
        </section>

        <section class="mb-20">
            <h2 class="text-[10px] uppercase opacity-30 mb-6 tracking-widest">Compounding Evidence (365 Days)</h2>
            <div class="flex flex-wrap gap-1.5">
                <template x-for="i in 365">
                    <div class="grid-cell" :class="i <= history.length ? 'win' : 'empty'"></div>
                </template>
            </div>
        </section>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-10 mb-12">
            <div class="space-y-4">
                <label class="text-[10px] uppercase opacity-30">What was the friction today?</label>
                <textarea x-model="friction" class="w-full bg-white/5 border border-white/10 p-4 h-32 rounded-lg outline-none focus:border-white/40" placeholder="Be honest. What slowed you down?"></textarea>
            </div>
            <div class="space-y-4">
                <label class="text-[10px] uppercase opacity-30">Tomorrow's One Win</label>
                <textarea x-model="nextGoal" class="w-full bg-white/5 border border-white/10 p-4 h-32 rounded-lg outline-none focus:border-white/40" placeholder="Set the target for tomorrow..."></textarea>
            </div>
        </div>

        <button @click="archive()" class="w-full py-5 bg-white text-black font-black uppercase tracking-widest rounded-lg hover:invert transition-all">Archive Day & Sync Tomorrow</button>
        
        <div class="mt-20 pt-10 border-t border-white/5 flex gap-6">
            <button @click="exportData()" class="text-[9px] opacity-30 hover:opacity-100 uppercase">Export_Vault</button>
            <button @click="importData()" class="text-[9px] opacity-30 hover:opacity-100 uppercase">Import_Vault</button>
        </div>
    </div>

    <script>
        function p365() {
            return {
                history: [],
                friction: '',
                nextGoal: '',
                todayDone: false,
                init() {
                    this.history = JSON.parse(localStorage.getItem('p365_elite') || '[]');
                },
                getCurrentGoal() {
                    if (this.history.length === 0) return "Set your first goal below.";
                    return this.history[this.history.length - 1].nextGoal;
                },
                archive() {
                    if(!this.nextGoal) return alert("You must set a goal for tomorrow.");
                    this.history.push({
                        date: new Date().toLocaleDateString(),
                        friction: this.friction,
                        nextGoal: this.nextGoal,
                        completed: this.todayDone
                    });
                    localStorage.setItem('p365_elite', JSON.stringify(this.history));
                    location.reload(); // Refresh to sync the HUD
                },
                exportData() {
                    const data = JSON.stringify(this.history);
                    const blob = new Blob([data], {type: 'application/json'});
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url; a.download = 'p365_vault.json'; a.click();
                }
            }
        }
    </script>
</body>
</html>
