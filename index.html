<!DOCTYPE html>
<html lang="en" x-data="project365()" x-init="init()">
<head>
    <meta charset="UTF-8">
    <title>PROJECT 365 // OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background: #050505; color: #fff; font-family: 'Inter', sans-serif; transition: all 0.5s ease; }
        .glass { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.08); }
        .brick { width: 10px; height: 10px; border-radius: 2px; transition: all 0.3s; }
        .active-brick { background: #fff; box-shadow: 0 0 8px rgba(255,255,255,0.5); }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="antialiased">

    <template x-if="!settings.active">
        <div class="fixed inset-0 z-[100] bg-black flex items-center justify-center p-6">
            <div class="max-w-md w-full space-y-8 text-center">
                <h1 class="text-4xl font-black italic tracking-tighter">INITIATE CONTRACT.</h1>
                <p class="opacity-40 text-xs tracking-widest uppercase">Define your $n^{1.1}$ Parameters</p>
                <div class="space-y-4">
                    <input type="number" x-model="settings.totalDays" placeholder="Duration (e.g. 365)" class="w-full bg-white/5 border border-white/10 p-4 outline-none focus:border-white/40">
                    <input type="text" x-model="settings.userName" placeholder="Your Name" class="w-full bg-white/5 border border-white/10 p-4 outline-none focus:border-white/40">
                    <button @click="startProject()" class="w-full py-4 bg-white text-black font-black uppercase text-xs tracking-[0.3em] hover:invert transition">Begin Operation</button>
                </div>
            </div>
        </div>
    </template>

    <div x-show="settings.active" x-cloak>
        <nav class="fixed top-0 w-full p-6 glass backdrop-blur-xl z-50 flex justify-between items-center">
            <div>
                <span class="font-black italic text-xl underline decoration-white/20" x-text="'P' + settings.totalDays"></span>
                <span class="ml-4 text-[10px] opacity-30 font-bold uppercase tracking-widest" x-text="settings.userName"></span>
            </div>
            <div class="flex gap-4 items-center">
                <div class="text-[10px] font-bold opacity-50 uppercase tracking-widest">Efficiency: <span class="text-white" x-text="efficiency + '%'"></span></div>
                <button @click="resetAll()" class="text-[8px] opacity-20 hover:opacity-100 uppercase font-bold tracking-widest">Hard Reset</button>
            </div>
        </nav>

        <main class="pt-32 px-6 max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-12 pb-24">
            
            <div class="lg:col-span-7 space-y-8">
                <section class="glass p-8 rounded-lg space-y-6">
                    <h2 class="text-[10px] font-black tracking-[0.4em] uppercase opacity-30 italic border-b border-white/5 pb-4">Morning Protocol</h2>
                    <div class="space-y-4">
                        <textarea x-model="dailyData.dream" @input="save()" class="w-full bg-white/5 border border-white/5 p-4 text-sm outline-none focus:border-white/20 h-24" placeholder="Subconscious Dream Log..."></textarea>
                        <div class="grid grid-cols-1 gap-2">
                            <input type="text" x-model="dailyData.gratitude[0]" @input="save()" class="bg-white/5 border border-white/5 p-3 text-sm outline-none" placeholder="Gratitude 01">
                            <input type="text" x-model="dailyData.gratitude[1]" @input="save()" class="bg-white/5 border border-white/5 p-3 text-sm outline-none" placeholder="Gratitude 02">
                            <input type="text" x-model="dailyData.gratitude[2]" @input="save()" class="bg-white/5 border border-white/5 p-3 text-sm outline-none" placeholder="Gratitude 03">
                        </div>
                    </div>
                </section>

                <section class="glass p-8 rounded-lg space-y-6">
                    <h2 class="text-[10px] font-black tracking-[0.4em] uppercase opacity-30 italic border-b border-white/5 pb-4">Evening Audit</h2>
                    <div class="grid grid-cols-2 gap-4">
                        <textarea x-model="dailyData.dontDo" @input="save()" class="w-full bg-white/5 border border-red-500/10 p-4 text-xs outline-none focus:border-red-500/20 h-24" placeholder="NOT to do tomorrow..."></textarea>
                        <textarea x-model="dailyData.mustDo" @input="save()" class="w-full bg-white/5 border border-green-500/10 p-4 text-xs outline-none focus:border-green-500/20 h-24" placeholder="MUST do tomorrow..."></textarea>
                    </div>
                </section>
            </div>

            <div class="lg:col-span-5 space-y-8">
                <section class="glass p-8 rounded-lg">
                    <h2 class="text-[10px] font-black tracking-[0.4em] uppercase opacity-30 italic mb-6">The Brick Wall [00:04:16]</h2>
                    <div class="flex flex-wrap gap-1">
                        <template x-for="i in parseInt(settings.totalDays)">
                            <div class="brick" :class="i <= history.length ? 'active-brick' : 'bg-white/5'"></div>
                        </template>
                    </div>
                    <div class="mt-8 border-t border-white/5 pt-6 flex justify-between items-center">
                        <div>
                            <div class="text-4xl font-black italic" x-text="history.length"></div>
                            <div class="text-[8px] uppercase tracking-widest opacity-30">Total Wins Stacked</div>
                        </div>
                        <button @click="endDay()" class="px-6 py-3 bg-white text-black font-black text-[10px] uppercase tracking-widest hover:scale-105 transition">Archive Day</button>
                    </div>
                </section>

                <section class="glass p-8 rounded-lg">
                    <h2 class="text-[10px] font-black tracking-[0.4em] uppercase opacity-30 italic mb-4">Identity Map</h2>
                    <div class="space-y-4 max-h-64 overflow-y-auto pr-2 custom-scroll">
                        <template x-for="log in history.slice().reverse()">
                            <div class="p-4 border border-white/5 mb-2 text-[10px] opacity-40 hover:opacity-100 transition">
                                <span class="block font-bold mb-1" x-text="log.date"></span>
                                <span x-text="'Dream: ' + log.dream.substring(0,30) + '...'"></span>
                            </div>
                        </template>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <script>
        function project365() {
            return {
                settings: { active: false, totalDays: 365, userName: '' },
                dailyData: { dream: '', gratitude: ['', '', ''], dontDo: '', mustDo: '' },
                history: [],
                efficiency: 0,

                init() {
                    const s = localStorage.getItem('p365_settings');
                    const h = localStorage.getItem('p365_history');
                    if (s) this.settings = JSON.parse(s);
                    if (h) this.history = JSON.parse(h);
                    this.calculateEfficiency();
                },

                startProject() {
                    if (this.settings.totalDays > 0) {
                        this.settings.active = true;
                        localStorage.setItem('p365_settings', JSON.stringify(this.settings));
                    }
                },

                save() {
                    localStorage.setItem('p365_current_day', JSON.stringify(this.dailyData));
                },

                endDay() {
                    const entry = {
                        date: new Date().toLocaleDateString(),
                        ...this.dailyData
                    };
                    this.history.push(entry);
                    localStorage.setItem('p365_history', JSON.stringify(this.history));
                    
                    // Reset for next day
                    this.dailyData = { dream: '', gratitude: ['', '', ''], dontDo: '', mustDo: '' };
                    this.save();
                    this.calculateEfficiency();
                },

                calculateEfficiency() {
                    if (this.history.length === 0) return;
                    // Logic: Bricks divided by days passed since start
                    this.efficiency = Math.round((this.history.length / this.settings.totalDays) * 100);
                },

                resetAll() {
                    if(confirm("Destroy all progress and reset contract?")) {
                        localStorage.clear();
                        window.location.reload();
                    }
                }
            }
        }
    </script>
</body>
</html>
